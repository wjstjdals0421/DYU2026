<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive | GSDD 2026</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        .archive-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 12rem 5% 8rem 5%;
        }
        .archive-title {
            font-family: var(--serif-font);
            font-size: 3.5rem;
            margin-bottom: 4rem;
        }
        .archive-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
        }
        .archive-item {
            border-bottom: 1px solid #eee;
        }
        .archive-link {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 0;
            text-decoration: none;
            color: #000;
            transition: all 0.3s;
        }
        .archive-link:hover {
            color: #888;
            padding-left: 1rem;
        }
        .year {
            font-size: 2.5rem;
            font-weight: 300;
            font-family: var(--serif-font);
        }
        .url {
            font-size: 0.8rem;
            color: #aaa;
            letter-spacing: 0.05rem;
        }
        .arrow { font-size: 1.5rem; }
    </style>
</head>
